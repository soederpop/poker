[package]
name = "pokurr_equity"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
rand = { version = "0.8", features = ["std", "std_rng"] }
getrandom = { version = "0.2", features = ["js"] }
aya_poker = "0.1"

[dev-dependencies]
once_cell = "1"
